<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafija</title>
</head>
<body>
    <div id="login-screen">
        <h2>Prisijungti į žaidimą</h2>
        <input type="text" id="playerName" placeholder="Tavo vardas">
        <button onclick="joinGame()">Prisijungti</button>
    </div>
    
    <div id="lobby-screen" style="display:none;">
        <h2>Laukiamasis</h2>
        <p>Prisijungę žaidėjai:</p>
        <ul id="playersList"></ul>
    </div>
    
    <!-- Socket.io kliento biblioteka -->
    <script src="https://cdn.socket.io/4.7.0/socket.io.min.js"></script>
    <script src="client.js"></script>
</body>
</html>
